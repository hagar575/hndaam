
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Hndaam</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic&display=swap" rel="stylesheet">
  </head>

  <body>
    <div class="language-switcher">
      <button onclick="setLanguage('english')">English</button>
      <button onclick="setLanguage('arabic')">العربية</button>
      <button onclick="setLanguage('urdu')">اردو</button>
    </div>

    <div class="information">
      <section class="client-information">
        <h1 data-i18n="information">Information</h1>
        <div>
          <input type="checkbox" id="master">
          <label for="master" data-i18n="master">Master</label>

          <input type="checkbox" id="tailor">
          <label for="tailor" data-i18n="tailor">Tailor</label>

          <input type="checkbox" id="trial">
          <label for="trial" data-i18n="trial">Trial</label>

          <input type="checkbox" id="repair">
          <label for="repair" data-i18n="repair">Repair</label>

          <input type="checkbox" id="full-order">
          <label for="full-order" data-i18n="fullOrder">Full Order</label>
        </div>

        <div>
          <label for="date-input" data-i18n="date">Date:</label>
          <input type="date" id="date-input">
        </div>

        <div>
          <label for="client-name" data-i18n="clientName">Client Name:</label>
          <input type="text" id="client-name">
        </div>

        <div>
          <label for="client-number" data-i18n="clientNumber">Client Number:</label>
          <input type="text" id="client-number">
        </div>

        <div>
          <label for="client-address" data-i18n="clientAddress">Client Address:</label>
          <input type="text" id="client-address">
        </div>
      </section>

      <section class="clothing-information">
        <div>
          <input type="checkbox" id="tailored">
          <label for="tailored" data-i18n="tailored">Tailored</label>

          <input type="checkbox" id="bespoke">
          <label for="bespoke" data-i18n="bespoke">Bespoke</label>

          <input type="checkbox" id="signature">
          <label for="signature" data-i18n="signature">Signature</label>

          <input type="checkbox" id="embroidery">
          <label for="embroidery" data-i18n="embroidery">Embroidery</label>
        </div>

        <div>
          <label for="quantity" data-i18n="quantity">Quantity:</label>
          <input type="number" id="quantity">
        </div>

        <div>
          <label for="weight" data-i18n="weight">Weight:</label>
          <input type="number" step="0.01" id="weight">
        </div>

        <div>
          <p data-i18n="fabric">Fabric:</p>
          <input type="radio" id="inhouse" name="fabric">
          <label for="inhouse" data-i18n="inhouse">Inhouse</label>
          
          <input type="radio" id="outsource" name="fabric">
          <label for="outsource" data-i18n="outsource">Outsource</label>
        </div>

        <div>
          <p data-i18n="garments">Garments:</p>
          <input type="checkbox" id="dishdasha">
          <label for="dishdasha" data-i18n="dishdasha">Dishdasha</label>

          <input type="checkbox" id="dagla">
          <label for="dagla" data-i18n="dagla">Dagla</label>

          <input type="checkbox" id="vest">
          <label for="vest" data-i18n="vest">Vest</label>

          <input type="checkbox" id="shirt">
          <label for="shirt" data-i18n="shirt">Shirt</label>

          <input type="checkbox" id="pants">
          <label for="pants" data-i18n="pants">Pants</label>

          <input type="checkbox" id="socks">
          <label for="socks" data-i18n="socks">Socks</label>

          <input type="checkbox" id="ghutra">
          <label for="ghutra" data-i18n="ghutra">Ghutra</label>

          <input type="checkbox" id="chemagh">
          <label for="chemagh" data-i18n="chemagh">Chemagh</label>

          <input type="checkbox" id="reset-measurements">
          <label for="reset" data-i18n="reset">Reset</label>

        </div>
      </section>

      <section class="measurements-section">
        <h1 data-i18n="measurements">Measurements</h1>
        <div class="measurement-grid">
          <div class="field-length">
            <label for="length" >
              <span data-i18n="length">Length</span>
            </label>
            <input type="number" step="0.1" id="length" name="length">
          </div>

          <div class="field-shoulder">
            <label for="shoulder">
              <span data-i18n="shoulder">Shoulder</span>
            </label>
            <input type="number" step="0.1" id="shoulder" name="shoulder">
          </div>

          <div class="field-sleeves">
            <label for="sleeves">
              <span data-i18n="sleeves">Sleeves</span>
            </label>
            <input type="number" step="0.1" id="sleeves" name="sleeves">
          </div>

          <div class="field-chest">
            <label for="chest">
              <span data-i18n="chest">Chest</span>
            </label>
            <input type="number" step="0.1" id="chest" name="chest">
          </div>

          <div class="field-half-chest">
            <label for="half-chest">
              <span data-i18n="halfChest">Half Chest</span>
            </label>
            <input type="number" step="0.1" id="half-chest" name="half-chest">
          </div>

          <div class="field-vest">
            <label for="vest-measurement">
              <span data-i18n="vest">Vest</span>
            </label>
            <input type="number" step="0.1" id="vest-measurement" name="vest-measurement">
          </div>

          <div class="field-bottom">
            <label for="bottom">
              <span data-i18n="bottom">Bottom</span>
            </label>
            <input type="number" step="0.1" id="bottom" name="bottom">
          </div>

          <div class="field-hem-fold">
            <label for="hem-fold">
              <span data-i18n="hemFold">Hem Fold</span>
            </label>
            <input type="number" step="0.1" id="hem-fold" name="hem-fold">
          </div>
        </div>
      </section>

      <section class="style-options">
        <h1 data-i18n="styleOptions">Style Options</h1>

        <div class="style-option">
          <div class="style-option-header">
            <span data-i18n="collarStyle">Collar Style</span>
          </div>
          <div class="option-row">
            <label data-i18n="standUpCollar"><input type="radio" name="collar-style" value="stand-up-collar"> Stand-up Collar</label>
            <label data-i18n="collarless"><input type="radio" name="collar-style" value="collarless"> Collarless</label>
            <label data-i18n="shirtCollar"><input type="radio" name="collar-style" value="shirt-collar"> Shirt Collar</label>
            <label data-i18n="roundedStandUpCollar"><input type="radio" name="collar-style" value="rounded-stand-up-collar"> Rounded Stand-up Collar</label>
          </div>
        </div>

        <div class="style-option">
          <div class="style-option-header">
            <span data-i18n="sidePocket">Side Pocket</span>
          </div>
          <div class="option-row">
            <label data-i18n="none"><input type="radio" name="side-pocket" value="none"> None</label>
            <label data-i18n="single"><input type="radio" name="side-pocket" value="single"> Single</label>
            <label data-i18n="double"><input type="radio" name="side-pocket" value="double"> Double</label>
          </div>
        </div>

        <div class="style-option">
          <div class="style-option-header">
            <span data-i18n="chestStrip">Chest Strip</span>
          </div>
          <div class="option-row">
            <label data-i18n="none"><input type="radio" name="chest-strip" value="none"> None</label>
            <label data-i18n="single"><input type="radio" name="chest-strip" value="single"> Single</label>
            <label data-i18n="double"><input type="radio" name="chest-strip" value="double"> Double</label>
          </div>
        </div>

        <div class="style-option">
          <div class="style-option-header">
            <span data-i18n="frontPocket">Front Pocket</span>
          </div>
          <div class="option-row">
            <label data-i18n="angledBottom"><input type="radio" name="front-pocket" value="angled-bottom"> Angled Bottom</label>
            <label data-i18n="roundedBottom"><input type="radio" name="front-pocket" value="rounded-bottom"> Rounded Bottom</label>
          </div>
        </div>

        <div class="style-option">
          <div class="style-option-header">
            <span data-i18n="cuffStyle">Cuff Style</span>
          </div>
          <div class="option-row">
            <label data-i18n="squareCuff"><input type="radio" name="cuff-style" value="square-cuff"> Square Cuff</label>
            <label data-i18n="roundedCuff"><input type="radio" name="cuff-style" value="rounded-cuff"> Rounded Cuff</label>
            <label data-i18n="angledCuff"><input type="radio" name="cuff-style" value="angled-cuff"> Angled Cuff</label>
            <label data-i18n="frenchCuff"><input type="radio" name="cuff-style" value="french-cuff"> French Cuff</label>
          </div>
        </div>

        <div class="style-option">
          <div class="style-option-header">
            <span data-i18n="button">Button</span>
          </div>
          <div class="option-row">
            <label data-i18n="stitchButton"><input type="radio" name="button-style" value="stitch"> Stitch Button</label>
            <label data-i18n="regularButton"><input type="radio" name="button-style" value="regular"> Regular Button</label>
            <label data-i18n="logo"><input type="radio" name="button-style" value="logo"> Button with logo</label>
          </div>
        </div>

        <!-- <div class="style-option">
          <label class="style-option-header"><span>Top Button</span> <span class="arabic-text">زرار علوي</span>
            <input type="checkbox" name="top-button" value="yes">
          </label>
        </div> -->

        <!-- <div class="style-option">
          <div class="style-option-header">
            <span>Wallet</span>
            <span class="arabic-text">محفظة</span>
          </div>
          <div class="option-row">
            <label><input type="radio" name="wallet" value="none"> None</label>
            <label><input type="radio" name="wallet" value="left"> Left</label>
            <label><input type="radio" name="wallet" value="right"> Right</label>
          </div>
        </div> -->

        <div class="style-option">
          <label class="style-option-header"><span data-i18n="zip">Zip</span> 
            <input type="checkbox" name="zip" value="yes">
          </label>
        </div>

        <div class="style-option">
          <span data-i18n="stitching">Stitching</span>
          <div class="option-row">
            <label data-i18n="single"><input type="radio" name="stitching" value="single"> Single</label>
            <label data-i18n="double"><input type="radio" name="stitching" value="double"> Double</label>
          </div>
        </div>

        <div class="style-option">
          <span data-i18n="sideLine">Side Line</span>
          <div class="option-row">
            <label data-i18n="one"><input type="radio" name="side-line" value="one">One</label>
            <label data-i18n="two"><input type="radio" name="side-line" value="two">Two</label>
          </div>
        </div>

        <div class="style-option">
          <span data-i18n="threadColor">Thread Color</span>
          <input type="text" name="thread-color">
        </div>
      </section>

      <section class="extras-section">
        <h1 data-i18n="extras">Extras</h1>

        <div class="extras-row two-columns">
          <label><input type="checkbox" name="visit" value="yes"> <span data-i18n="visit">Visit</span></label>
          <label><input type="checkbox" name="delivery" value="yes"> <span data-i18n="delivery">Delivery</span></label>
        </div>

        <div class="extras-row two-columns">
          <label><input type="checkbox" name="dry-clean" value="yes"> <span data-i18n="dryClean">Dry Clean</span></label>
        </div>

        <div class="extras-row two-columns">
          <label><input type="checkbox" name="soaking" value="yes"> <span data-i18n="soaking">Soaking</span></label>
        </div>

        <div class="extras-row two-columns">
          <label><input type="checkbox" name="laundry" value="yes"> <span data-i18n="laundry">Laundry</span></label>
        </div>

        <!-- <div class="extras-row two-columns">
          <label><input type="checkbox" name="pant" value="yes"> <span>Pant</span> <span class="arabic-text">بنطلون</span></label>
        </div> -->

        <div class="extras-row two-columns">
          <label for="first-piece"><span data-i18n="firstPiece">First Piece</span></label>
          <input type="text" id="first-piece" name="first-piece">
        </div>

        <div class="extras-row two-columns">
          <label for="due-date"><span data-i18n="dueDate">Due Date</span></label>
          <input type="date" id="due-date" name="due-date">
        </div>

        <div class="extras-row full-width">
          <label for="remarks"><span data-i18n="remarks">Remarks</span></label>
          <textarea id="remarks" name="remarks"></textarea>
        </div>
      </section>

      <button id="submit-btn" data-i18n="submitOrder">Submit Order</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>

</html>
